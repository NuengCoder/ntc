name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ntc for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - os: linux
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-linux-x86_64

          # macOS Intel
          - os: macos-intel
            runs-on: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-macos-x86_64

          # macOS Apple Silicon
          - os: macos-silicon
            runs-on: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .deb package (Linux only)
        if: matrix.os == 'linux'
        run: |
          cargo install cargo-deb
          cargo deb
          mkdir -p artifacts
          cp target/debian/*.deb artifacts/

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/ntc artifacts/

      - name: Create archive
        shell: bash
        run: |
          cd artifacts
          tar -czvf ${{ matrix.archive_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: artifacts/${{ matrix.archive_name }}.tar.gz

  create-universal-macos:
    name: Create Universal macOS Binary
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download Intel binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-x86_64
          path: intel

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-aarch64
          path: arm64

      - name: Create universal binary
        run: |
          # Extract the binaries
          tar -xzvf intel/ntc-${{ github.ref_name }}-macos-x86_64.tar.gz -C intel
          tar -xzvf arm64/ntc-${{ github.ref_name }}-macos-aarch64.tar.gz -C arm64
          
          # Combine into universal binary
          mkdir -p universal
          lipo -create intel/ntc arm64/ntc -output universal/ntc
          
          # Create universal archive
          cd universal
          tar -czvf ../ntc-${{ github.ref_name }}-macos-universal.tar.gz ntc

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-universal
          path: ntc-${{ github.ref_name }}-macos-universal.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, create-universal-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          find artifacts -type f
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ntc ${{ github.ref_name }}
          body: |
            ## 🚀 ntc ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            | Platform | Download |
            |----------|----------|
            | Linux (x86_64) | [ntc-${{ github.ref_name }}-linux-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-x86_64.tar.gz) |
            | Ubuntu/Debian | [ntc_${{ github.ref_name }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc_${{ github.ref_name }}_amd64.deb) |
            | macOS (Intel) | [ntc-${{ github.ref_name }}-macos-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-x86_64.tar.gz) |
            | macOS (Apple Silicon) | [ntc-${{ github.ref_name }}-macos-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-aarch64.tar.gz) |
            | macOS (Universal) | [ntc-${{ github.ref_name }}-macos-universal.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-universal.tar.gz) |
            
            ### 🚀 Quick Install
            
            **Linux:**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-x86_64.tar.gz
            tar -xzvf ntc-${{ github.ref_name }}-linux-x86_64.tar.gz
            sudo mv ntc /usr/local/bin/