[package]
name = "ntc"
version = "1.7.0"
edition = "2021"
description = "Navigate, Tree, Cat - A combined directory tree viewer and file concatenator"
authors = ["NuengCoder"]
license = "MIT"

[[bin]]
name = "ntc"
path = "src/main.rs"

[lib]
name = "ntc"
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
rustyline = "15.0"
anyhow = "1.0"
chrono = "0.4"
dirs = "6.0"
indicatif = "0.17"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
colored = "2"
rayon = "1.10"
notify = "7"
ctrlc = "3.4"
lazy_static = "1.4"
serde_json = "1.0"
arboard = "3.4"

[dev-dependencies]
tempfile = "3.15"
assert_cmd = "2.0"
predicates = "3.1"

[build-dependencies]
winres = "0.1"

[package.metadata.deb]
maintainer = "Nueng <thilaphonneung@gmail.com>"
copyright = "2026, Nueng"
license-file = ["LICENSE", "3"]
extended-description = """\
ntc is a combined directory tree viewer and file concatenator.
It helps navigate, visualize, and report on directory structures."""
depends = "$auto"  # Automatically detects if you need libc, etc.