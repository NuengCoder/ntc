[package]
name = "ntc"
version = "1.3.0"
edition = "2021"
description = "Navigate, Tree, Cat - A combined directory tree viewer and file concatenator"
authors = ["Nueng"]
license = "MIT"

[[bin]]
name = "ntc"
path = "src/main.rs"

[lib]
name = "ntc"
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
rustyline = "15.0"
anyhow = "1.0"
chrono = "0.4"
dirs = "6.0"
atty = "0.2"
indicatif = "0.17"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
tempfile = "3.15"
assert_cmd = "2.0"
predicates = "3.1"