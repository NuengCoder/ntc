name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ntc for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - os: linux
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-linux-x86_64

          # Linux ARM64 (for ARM servers / Raspberry Pi)
          - os: linux-arm64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-linux-aarch64

          # macOS Intel
          - os: macos-intel
            runs-on: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-macos-x86_64

          # macOS Apple Silicon
          - os: macos-silicon
            runs-on: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-macos-aarch64

          # Termux / Android (ARM64)
          - os: android
            runs-on: ubuntu-latest
            target: aarch64-linux-android
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-android-aarch64

          # Termux / Android (ARMv7) - for older 32-bit Android devices
          - os: android-armv7
            runs-on: ubuntu-latest
            target: armv7-linux-androideabi
            artifact_name: ntc
            archive_name: ntc-${{ github.ref_name }}-android-armv7

          # Windows (x86_64)
          - os: windows
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ntc.exe
            archive_name: ntc-${{ github.ref_name }}-windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install Android NDK (for Android targets)
        if: contains(matrix.os, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
          echo "ANDROID_NDK_HOME=/usr/lib/android-sdk/ndk-bundle" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .deb package (Linux only)
        if: matrix.os == 'linux'
        run: |
          cargo install cargo-deb
          cargo deb
          mkdir -p artifacts
          cp target/debian/*.deb artifacts/

      - name: Create Windows installer (Windows only)
        if: matrix.os == 'windows'
        run: |
          cargo install cargo-inno
          cargo inno build
          mkdir -p artifacts
          cp target/inno/*.exe artifacts/

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/ntc.exe artifacts/
          else
            cp target/${{ matrix.target }}/release/ntc artifacts/
          fi

      - name: Create archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          cd artifacts
          tar -czvf ${{ matrix.archive_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          cd artifacts
          zip ${{ matrix.archive_name }}.zip ${{ matrix.artifact_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: artifacts/${{ matrix.archive_name }}.*

  create-universal-macos:
    name: Create Universal macOS Binary
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download Intel binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-x86_64
          path: intel

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-aarch64
          path: arm64

      - name: Create universal binary
        run: |
          # Extract the binaries
          tar -xzvf intel/ntc-${{ github.ref_name }}-macos-x86_64.tar.gz -C intel
          tar -xzvf arm64/ntc-${{ github.ref_name }}-macos-aarch64.tar.gz -C arm64
          
          # Combine into universal binary
          mkdir -p universal
          lipo -create intel/ntc arm64/ntc -output universal/ntc
          
          # Create universal archive
          cd universal
          tar -czvf ../ntc-${{ github.ref_name }}-macos-universal.tar.gz ntc

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-universal
          path: ntc-${{ github.ref_name }}-macos-universal.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, create-universal-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          find artifacts -type f
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ntc ${{ github.ref_name }}
          body: |
            ## 🚀 ntc ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Windows | x86_64 | [ntc-${{ github.ref_name }}-windows-x86_64.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-windows-x86_64.zip) |
            | Windows Installer | x86_64 | [ntc-installer-${{ github.ref_name }}.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-installer-${{ github.ref_name }}.exe) |
            | Linux | x86_64 | [ntc-${{ github.ref_name }}-linux-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-x86_64.tar.gz) |
            | Linux | ARM64 | [ntc-${{ github.ref_name }}-linux-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-aarch64.tar.gz) |
            | Ubuntu/Debian | amd64 | [ntc_${{ github.ref_name }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc_${{ github.ref_name }}_amd64.deb) |
            | macOS | Intel | [ntc-${{ github.ref_name }}-macos-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-x86_64.tar.gz) |
            | macOS | Apple Silicon | [ntc-${{ github.ref_name }}-macos-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-aarch64.tar.gz) |
            | macOS | Universal | [ntc-${{ github.ref_name }}-macos-universal.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-universal.tar.gz) |
            | Termux/Android | ARM64 | [ntc-${{ github.ref_name }}-android-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-android-aarch64.tar.gz) |
            | Termux/Android | ARMv7 | [ntc-${{ github.ref_name }}-android-armv7.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-android-armv7.tar.gz) |
            
            ### 🚀 Quick Install
            
            **Linux (x86_64):**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-x86_64.tar.gz
            tar -xzvf ntc-${{ github.ref_name }}-linux-x86_64.tar.gz
            sudo mv ntc /usr/local/bin/ ```

            **Linux (ARM64):**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-linux-aarch64.tar.gz
            tar -xzvf ntc-${{ github.ref_name }}-linux-aarch64.tar.gz
            sudo mv ntc /usr/local/bin/ ```

            **Ubuntu/Debian:**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc_${{ github.ref_name }}_amd64.deb
            sudo dpkg -i ntc_${{ github.ref_name }}_amd64.deb ```

            **Termux (Android):**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-android-aarch64.tar.gz
            tar -xzvf ntc-${{ github.ref_name }}-android-aarch64.tar.gz
            cp ntc $PREFIX/bin/
            chmod +x $PREFIX/bin/ntc```

            **Windows:**
            Download the .zip file, extract, and add ntc.exe to your PATH.
            Or run the .exe installer.

            **macOS:**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ntc-${{ github.ref_name }}-macos-universal.tar.gz
            tar -xzvf ntc-${{ github.ref_name }}-macos-universal.tar.gz
            sudo mv ntc /usr/local/bin/```

            ## ✨ New in v1.8.0
            - Backup & Restore system (bkup, pldw, unpd)
            - Fuzzy file & directory search (fs, ds)
            - View flags (-s, -d, --size, --depth)
            - Teleport via go to / cd to
            - Multi-argument run aliases (ral add name(x,y) "cmd $x $y")
            - Termux/Android support
            - macOS Universal Binary