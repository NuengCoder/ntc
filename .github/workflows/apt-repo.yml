name: Publish APT Repository

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-apt:
    name: Build .deb and publish to GitHub Pages APT repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Install cargo-deb & repo tools
        run: |
          cargo install cargo-deb
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Build .deb
        run: cargo deb --target x86_64-unknown-linux-gnu

      - name: Prepare apt repo structure
        run: |
          VERSION="${{ github.ref_name }}"       # e.g. v1.9.0
          VERSION_NO_V="${VERSION#v}"             # e.g. 1.9.0
          DEB_FILE=$(ls target/x86_64-unknown-linux-gnu/debian/*.deb | head -1)

          mkdir -p apt-repo/pool/main/n/ntc
          mkdir -p apt-repo/dists/stable/main/binary-amd64

          cp "$DEB_FILE" apt-repo/pool/main/n/ntc/

          cd apt-repo

          # Generate Packages.gz
          dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages
          gzip -9 -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cat > dists/stable/Release << EOF
          Origin: ntc
          Label: ntc APT Repository
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: APT repository for ntc - Navigate, Tree, Cat
          Date: $(date -Ru)
          EOF

          # Generate Release.gpg (unsigned — users use apt's allow-insecure=yes or you can sign)
          cd ..

          echo "APT repo prepared at apt-repo/"
          find apt-repo -type f

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: false
