<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - ntc Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #f5f5f5;
            color: #222;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 24px 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header .meta {
            opacity: 0.9;
            font-size: 14px;
        }
        .stats {
            display: flex;
            gap: 24px;
            padding: 16px 32px;
            background: #eef2f7;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .stat-label {
            font-weight: 600;
            color: #555;
        }
        .stat-value {
            font-weight: 700;
            color: #1e3c72;
        }
        .tree {
            padding: 24px 32px;
            background: #fafbfc;
            border-bottom: 1px solid #e1e4e8;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 14px;
            white-space: pre;
            overflow-x: auto;
        }
        .file-section {
            padding: 24px 32px;
        }
        .file {
            margin-bottom: 32px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            overflow: hidden;
        }
        .file-header {
            background: #f6f8fa;
            padding: 12px 20px;
            font-weight: 600;
            font-family: monospace;
            border-bottom: 1px solid #e1e4e8;
            cursor: pointer;
            user-select: none;
        }
        .file-header:hover {
            background: #eef2f7;
        }
        .file-content {
            padding: 16px 20px;
            background: #fff;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: none;
        }
        .file-content.open {
            display: block;
        }
        .line-number {
            color: #8a8a8a;
            user-select: none;
            display: inline-block;
            width: 45px;
            text-align: right;
            margin-right: 15px;
        }
        .skipped {
            background: #fff3f0;
            padding: 16px 20px;
            border-radius: 8px;
            color: #c73e1d;
            font-size: 14px;
        }
        .footer {
            background: #eef2f7;
            padding: 16px 32px;
            font-size: 12px;
            color: #666;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .theme-btn {
            float: right;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
        }
        /* Dark mode */
        body.dark {
            background: #1a1a1a;
        }
        body.dark .container {
            background: #2d2d2d;
            color: #e0e0e0;
        }
        body.dark .stats {
            background: #252525;
            border-bottom-color: #3a3a3a;
        }
        body.dark .stat-value {
            color: #6ea3d9;
        }
        body.dark .tree {
            background: #1e1e1e;
            border-bottom-color: #3a3a3a;
        }
        body.dark .file-header {
            background: #333;
            border-bottom-color: #4a4a4a;
        }
        body.dark .file-header:hover {
            background: #3a3a3a;
        }
        body.dark .file-content {
            background: #2d2d2d;
        }
        body.dark .line-number {
            color: #aaa;
        }
        body.dark .skipped {
            background: #3a2a2a;
            color: #ffaa88;
        }
        body.dark .footer {
            background: #252525;
            border-top-color: #3a3a3a;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="theme-btn" onclick="toggleTheme()">🌓 Dark/Light</button>
        <h1>📁 {{title}} - ntc Report</h1>
        <div class="meta">Generated by ntc {{version}} on {{date}}</div>
    </div>
    <div class="stats">
        <div class="stat"><span class="stat-label">Files:</span><span class="stat-value">{{total_files}}</span></div>
        <div class="stat"><span class="stat-label">Directories:</span><span class="stat-value">{{total_dirs}}</span></div>
        <div class="stat"><span class="stat-label">Total size:</span><span class="stat-value">{{total_size}}</span></div>
        <div class="stat"><span class="stat-label">Scan time:</span><span class="stat-value">{{scan_time}}s</span></div>
    </div>
    <div class="tree">
        {{tree}}
    </div>
    <div class="file-section">
        {{files}}
    </div>
    <div class="footer">
        <span>Navigate · Tree · Cat</span>
    </div>
</div>
<script>
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('ntc-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    // Load saved theme
    if (localStorage.getItem('ntc-theme') === 'dark') {
        document.body.classList.add('dark');
    }
    // Toggle file content visibility
    document.querySelectorAll('.file-header').forEach(header => {
        header.addEventListener('click', () => {
            const content = header.nextElementSibling;
            content.classList.toggle('open');
        });
    });
</script>
</body>
</html>
