name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build ntc for macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            archive_name: ntc-${{ github.ref_name }}-macos-x86_64
          - target: aarch64-apple-darwin
            archive_name: ntc-${{ github.ref_name }}-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare and tarball
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/ntc artifacts/
          cd artifacts
          tar -czvf ../${{ matrix.archive_name }}.tar.gz ntc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.tar.gz
          compression-level: 0

  create-universal-macos:
    name: Create Universal macOS Binary
    runs-on: macos-latest
    needs: build-macos
    steps:
      - name: Download Intel binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-x86_64
          path: intel

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-aarch64
          path: arm64

      - name: Create universal binary
        shell: bash
        run: |
          cd intel && tar -xzvf ntc-${{ github.ref_name }}-macos-x86_64.tar.gz && cd ..
          cd arm64 && tar -xzvf ntc-${{ github.ref_name }}-macos-aarch64.tar.gz && cd ..
          mkdir -p universal
          lipo -create intel/ntc arm64/ntc -output universal/ntc
          cd universal
          tar -czvf ../ntc-${{ github.ref_name }}-macos-universal.tar.gz ntc

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: ntc-${{ github.ref_name }}-macos-universal
          path: ntc-${{ github.ref_name }}-macos-universal.tar.gz
          compression-level: 0

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, create-universal-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ntc ${{ github.ref_name }}
          body: |
            ## ntc ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Intel) | `ntc-${{ github.ref_name }}-macos-x86_64.tar.gz` |
            | macOS (Apple Silicon) | `ntc-${{ github.ref_name }}-macos-aarch64.tar.gz` |
            | macOS (Universal) | `ntc-${{ github.ref_name }}-macos-universal.tar.gz` |

            ### Quick Install

            **macOS (Homebrew):**
            ```bash
            brew install ntc
            ```

            **macOS (manual):**
            ```bash
            tar -xzf ntc-${{ github.ref_name }}-macos-universal.tar.gz
            sudo mv ntc /usr/local/bin/
            ```

            **npm (cross-platform):**
            ```bash
            npm install -g ntc
            ```
          files: |
            artifacts/**/*

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-macos, create-universal-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Prepare npm package
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          mkdir -p npm-package/bin npm-package/scripts

          # Copy package files
          cp packaging/npm/package.json npm-package/
          cp packaging/npm/bin/ntc.js npm-package/bin/
          cp packaging/npm/scripts/install.js npm-package/scripts/

          # Update version in package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION_NO_V\"/" npm-package/package.json

          cd npm-package
          npm pack

      - name: Publish to npm
        shell: bash
        run: |
          cd npm-package
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
